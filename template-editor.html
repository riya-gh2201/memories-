<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template Studio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@1&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f0d0b;
      --surface: #1a1714;
      --border: rgba(255, 255, 255, 0.07);
      --gold: #c9a96e;
      --gold-soft: rgba(201, 169, 110, 0.15);
      --text: #e8e0d4;
      --text-muted: rgba(232, 224, 212, 0.45);
      --accent: #c9a96e;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* Layout */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--gold);
    }

    .sidebar-header p {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      font-weight: 500;
    }

    /* Template grid */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tmpl-thumb {
      aspect-ratio: 9/16;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .tmpl-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tmpl-thumb:hover {
      transform: scale(1.03);
      border-color: var(--gold-soft);
    }

    .tmpl-thumb.active {
      border-color: var(--gold);
    }

    .tmpl-thumb .tmpl-num {
      position: absolute;
      bottom: 4px;
      left: 6px;
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(0, 0, 0, 0.5);
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* Upload button */
    .upload-zone {
      border: 1px dashed rgba(201, 169, 110, 0.35);
      border-radius: 8px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover {
      border-color: var(--gold);
      background: var(--gold-soft);
    }

    .upload-zone .upload-icon {
      font-size: 1.6rem;
      margin-bottom: 6px;
      opacity: 0.7;
    }

    .upload-zone p {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .upload-zone span {
      color: var(--gold);
    }

    #fileInput {
      display: none;
    }

    /* Photo controls */
    .photo-controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .control-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-row label {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .control-row input[type="range"] {
    width: 100%;
    height: 2px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
  }
  .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
    }

    /* Text controls */
    .text-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      padding: 10px 12px;
      resize: vertical;
      min-height: 70px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: rgba(201, 169, 110, 0.5);
    }

    .text-style-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .style-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .style-btn:hover,
    .style-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-soft);
    }

    select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      padding: 7px 10px;
      outline: none;
      cursor: pointer;
      flex: 1;
    }

    .color-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .color-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
      flex-shrink: 0;
    }

    .color-dot:hover {
      transform: scale(1.15);
    }

    .color-dot.active {
      border-color: var(--gold);
    }

    /* Font size */
    .font-size-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .fs-btn {
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .fs-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .fs-display {
      font-size: 0.72rem;
      color: var(--text-muted);
      min-width: 28px;
      text-align: center;
    }

    /* Text position */
    .pos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .pos-btn {
      padding: 6px 4px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .pos-btn:hover,
    .pos-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-soft);
    }

    /* Download */
    .download-btn {
      margin: 20px 24px;
      width: calc(100% - 48px);
      padding: 13px;
      background: var(--gold);
      color: #0f0d0b;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .download-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    /* Main canvas area */
    .canvas-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: radial-gradient(ellipse at center, #1c1916 0%, #0f0d0b 70%);
      min-height: 100vh;
    }

    .canvas-area h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      cursor: move;
    }

    #mainCanvas {
      display: block;
      max-height: 75vh;
      max-width: 100%;
      width: auto;
    }

    .canvas-hint {
      margin-top: 16px;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* No template state */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .empty-state .big-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(201, 169, 110, 0.25);
      border-radius: 2px;
    }
  </style>
</head>

<body>

  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Template Studio</h1>
        <p>Design · Edit · Create</p>
      </div>

      <!-- Templates -->
      <div class="section">
        <div class="section-label">Choose Template</div>
        <div class="template-grid" id="templateGrid"></div>
      </div>

      <!-- Upload photo -->
      <div class="section">
        <div class="section-label">Your Photo</div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon">🖼</div>
          <p>Click to <span>upload your photo</span><br>PNG, JPG, WEBP</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <div class="photo-controls" style="margin-top:16px;" id="photoControls">
          <div class="control-row">
            <label>Scale</label>
            <input type="range" id="photoScale" min="10" max="200" value="80" step="1">
          </div>
          <div class="control-row">
            <label>Horizontal position</label>
            <input type="range" id="photoX" min="0" max="100" value="50" step="1">
          </div>
          <div class="control-row">
            <label>Vertical position</label>
            <input type="range" id="photoY" min="0" max="100" value="60" step="1">
          </div>
          <div class="control-row">
            <label>Opacity</label>
            <input type="range" id="photoOpacity" min="10" max="100" value="100" step="1">
          </div>
        </div>
      </div>

      <!-- Text -->
      <div class="section">
        <div class="section-label">Text</div>
        <div class="text-controls">
          <textarea id="textInput" placeholder="Type your text here…"></textarea>

          <div class="text-style-row">
            <select id="fontFamily">
              <option value="'DM Sans', sans-serif">DM Sans</option>
              <option value="'Cormorant Garamond', serif">Cormorant</option>
              <option value="'Playfair Display', serif">Playfair</option>
              <option value="Georgia, serif">Georgia</option>
              <option value="monospace">Monospace</option>
            </select>
            <button class="style-btn" id="boldBtn" onclick="toggleStyle('bold')">B</button>
            <button class="style-btn" id="italicBtn" onclick="toggleStyle('italic')"><i>I</i></button>
          </div>

          <div class="font-size-row">
            <button class="fs-btn" onclick="changeFontSize(-2)">−</button>
            <div class="fs-display" id="fsSizeDisplay">28px</div>
            <button class="fs-btn" onclick="changeFontSize(2)">+</button>
            <div style="font-size:0.65rem;color:var(--text-muted);margin-left:8px;">size</div>
          </div>

          <div>
            <div class="section-label" style="margin-bottom:8px;">Text Color</div>
            <div class="color-row" id="colorRow">
              <div class="color-dot active" data-color="#ffffff" style="background:#ffffff"></div>
              <div class="color-dot" data-color="#000000"
                style="background:#000000;border-color:rgba(255,255,255,0.15)"></div>
              <div class="color-dot" data-color="#c9a96e" style="background:#c9a96e"></div>
              <div class="color-dot" data-color="#f4a7b9" style="background:#f4a7b9"></div>
              <div class="color-dot" data-color="#a8c5b5" style="background:#a8c5b5"></div>
              <div class="color-dot" data-color="#9b8fa8" style="background:#9b8fa8"></div>
              <div class="color-dot" data-color="#e8d5b5" style="background:#e8d5b5"></div>
            </div>
          </div>

          <div>
            <div class="section-label" style="margin-bottom:8px;">Text Position</div>
            <div class="pos-grid">
              <button class="pos-btn" data-pos="top-left">↖ Top L</button>
              <button class="pos-btn active" data-pos="top-center">↑ Top C</button>
              <button class="pos-btn" data-pos="top-right">↗ Top R</button>
              <button class="pos-btn" data-pos="mid-left">← Mid L</button>
              <button class="pos-btn" data-pos="mid-center">· Center</button>
              <button class="pos-btn" data-pos="mid-right">→ Mid R</button>
              <button class="pos-btn" data-pos="bot-left">↙ Bot L</button>
              <button class="pos-btn" data-pos="bot-center">↓ Bot C</button>
              <button class="pos-btn" data-pos="bot-right">↘ Bot R</button>
            </div>
          </div>
        </div>
      </div>

      <button class="download-btn" onclick="downloadImage()">⬇ Download Image</button>
    </div>

    <!-- CANVAS AREA -->
    <div class="canvas-area">
      <h2>Preview</h2>
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas" width="600" height="1067"></canvas>
      </div>
      <div class="canvas-hint">Select a template from the sidebar to begin</div>
    </div>
  </div>

  <script>
    // Template image paths (same directory as this file)
    const TEMPLATES = [
      'download.jpeg',
      'download (1).jpeg',
      'download (2).jpeg',
      'download (3).jpeg',
      'download (4).jpeg',
      'download (5).jpeg',
      'download (6).jpeg',
      'download (7).jpeg',
      'download (8).jpeg',
      'download (9).jpeg',
      'download (10).jpeg',
    ];

    const TEMPLATE_LABELS = [
      'Purple Petals', 'Boho Leaves', 'Soft Bloom', 'Watercolor', 'Pink Meadow',
      'Abstract Rose', 'Grey Hearts', 'Dark Marble', 'Black Flowers', 'Book Girl', 'Book Girl 2'
    ];

    let state = {
      templateImg: null,
      userImg: null,
      templateIdx: -1,
      photoScale: 80,
      photoX: 50,
      photoY: 60,
      photoOpacity: 100,
      text: '',
      fontFamily: "'DM Sans', sans-serif",
      fontSize: 28,
      bold: false,
      italic: false,
      textColor: '#ffffff',
      textPos: 'top-center',
    };

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    // Build template thumbnails
    const grid = document.getElementById('templateGrid');
    TEMPLATES.forEach((src, i) => {
      const div = document.createElement('div');
      div.className = 'tmpl-thumb';
      div.title = TEMPLATE_LABELS[i];
      div.innerHTML = `<img src="${src}" alt="${TEMPLATE_LABELS[i]}"><span class="tmpl-num">${i + 1}</span>`;
      div.addEventListener('click', () => selectTemplate(i, src));
      grid.appendChild(div);
    });

    function selectTemplate(idx, src) {
      document.querySelectorAll('.tmpl-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
      state.templateIdx = idx;
      const img = new Image();
      img.onload = () => { state.templateImg = img; draw(); };
      img.src = src;
    }

    // File upload
    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => { state.userImg = img; draw(); };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Range controls
    ['photoScale', 'photoX', 'photoY', 'photoOpacity'].forEach(id => {
      document.getElementById(id).addEventListener('input', e => {
        state[id.replace('photo', 'photo')] = parseFloat(e.target.value);
        // map keys
        if (id === 'photoScale') state.photoScale = parseFloat(e.target.value);
        if (id === 'photoX') state.photoX = parseFloat(e.target.value);
        if (id === 'photoY') state.photoY = parseFloat(e.target.value);
        if (id === 'photoOpacity') state.photoOpacity = parseFloat(e.target.value);
        draw();
      });
    });

    // Text
    document.getElementById('textInput').addEventListener('input', e => { state.text = e.target.value; draw(); });
    document.getElementById('fontFamily').addEventListener('change', e => { state.fontFamily = e.target.value; draw(); });

    function toggleStyle(which) {
      if (which === 'bold') {
        state.bold = !state.bold;
        document.getElementById('boldBtn').classList.toggle('active', state.bold);
      } else {
        state.italic = !state.italic;
        document.getElementById('italicBtn').classList.toggle('active', state.italic);
      }
      draw();
    }

    let fontSize = 28;
    function changeFontSize(delta) {
      fontSize = Math.max(10, Math.min(120, fontSize + delta));
      state.fontSize = fontSize;
      document.getElementById('fsSizeDisplay').textContent = fontSize + 'px';
      draw();
    }

    // Colors
    document.querySelectorAll('.color-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        state.textColor = dot.dataset.color;
        draw();
      });
    });

    // Position
    document.querySelectorAll('.pos-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.textPos = btn.dataset.pos;
        draw();
      });
    });

    function getTextCoords(pos, cw, ch, padding) {
      const map = {
        'top-left': [padding, padding + state.fontSize, 'left'],
        'top-center': [cw / 2, padding + state.fontSize, 'center'],
        'top-right': [cw - padding, padding + state.fontSize, 'right'],
        'mid-left': [padding, ch / 2, 'left'],
        'mid-center': [cw / 2, ch / 2, 'center'],
        'mid-right': [cw - padding, ch / 2, 'right'],
        'bot-left': [padding, ch - padding, 'left'],
        'bot-center': [cw / 2, ch - padding, 'center'],
        'bot-right': [cw - padding, ch - padding, 'right'],
      };
      return map[pos] || map['top-center'];
    }

    function draw() {
      const cw = canvas.width, ch = canvas.height;
      ctx.clearRect(0, 0, cw, ch);

      // Draw template background
      if (state.templateImg) {
        ctx.drawImage(state.templateImg, 0, 0, cw, ch);
      } else {
        ctx.fillStyle = '#1a1714';
        ctx.fillRect(0, 0, cw, ch);
        ctx.fillStyle = 'rgba(201,169,110,0.12)';
        ctx.font = '18px DM Sans';
        ctx.textAlign = 'center';
        ctx.fillText('Select a template to begin', cw / 2, ch / 2);
      }

      // Draw user photo
      if (state.userImg) {
        const maxW = cw * (state.photoScale / 100);
        const ratio = state.userImg.naturalHeight / state.userImg.naturalWidth;
        const imgW = maxW;
        const imgH = maxW * ratio;
        const x = (cw * state.photoX / 100) - imgW / 2;
        const y = (ch * state.photoY / 100) - imgH / 2;

        ctx.save();
        ctx.globalAlpha = state.photoOpacity / 100;
        ctx.drawImage(state.userImg, x, y, imgW, imgH);
        ctx.restore();
      }

      // Draw text
      if (state.text.trim()) {
        const lines = state.text.split('\n');
        const pad = 30;
        const [tx, ty, align] = getTextCoords(state.textPos, cw, ch, pad);
        const lh = state.fontSize * 1.4;

        const fontStr = `${state.italic ? 'italic ' : ''}${state.bold ? 'bold ' : ''}${state.fontSize}px ${state.fontFamily}`;
        ctx.font = fontStr;
        ctx.textAlign = align;
        ctx.textBaseline = 'alphabetic';

        // Subtle text shadow for readability
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.55)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.fillStyle = state.textColor;

        // Adjust start Y if multi-line and near bottom
        let startY = ty;
        if (state.textPos.startsWith('bot')) {
          startY = ty - lh * (lines.length - 1);
        } else if (state.textPos.startsWith('mid')) {
          startY = ty - (lh * (lines.length - 1)) / 2;
        }

        lines.forEach((line, i) => {
          ctx.fillText(line, tx, startY + i * lh);
        });
        ctx.restore();
      }
    }

    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'my-template.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Initial blank draw
    draw();
  </script>
</body>

</html>
