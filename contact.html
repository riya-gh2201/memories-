    <style>
        .creator-card {
            background-color: #8c5f40;
            /* Medium brown */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.12'/%3E%3C/svg%3E");
            border-radius: 6px;
            padding: 3.5rem 2rem 3rem;
            position: relative;
            box-shadow: 6px 10px 25px rgba(0, 0, 0, 0.25), inset 0 0 30px rgba(0, 0, 0, 0.15);
            border: 1px solid #5a3c26;
            /* Darker border for the very edge */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .creator-card::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1.5px dashed rgba(255, 235, 205, 0.4);
            /* Stitched inner border */
            border-radius: 4px;
            pointer-events: none;
            z-index: 1;
        }

        .creator-card::before {
            content: '';
            position: absolute;
            width: 60px;
            /* Slightly longer tape */
            height: 16px;
            background: var(--tape, #dbcbba);
            border-radius: 1px;
            z-index: 3;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
            top: -8px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
        }

        .creator-card-title {
            font-family: 'Crimson Pro', serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #ffffff;
            /* Pure white for maximum clarity */
            margin-bottom: 0.4rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);
            /* Stronger shadow for contrast */
            letter-spacing: 0.5px;
        }

        .creator-card-subtitle {
            font-family: 'Crimson Pro', serif;
            font-style: italic;
            font-weight: 500;
            /* Increased weight from 300 to 500 for better legibility */
            font-size: 1.15rem;
            color: #fcf4eb;
            /* Brighter, clearer off-white */
            margin-bottom: 2.5rem;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
        }

        .creator-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 8px 16px;
            border-radius: 3px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 0.9rem;
            font-weight: 600 !important;
            text-decoration: none;
            background: transparent;
            transition: all 0.2s;
        }

        .btn-github {
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #f5e6d3;
            background: rgba(0, 0, 0, 0.25);
        }

        .btn-github:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .btn-linkedin {
            border: 1px solid rgba(89, 166, 212, 0.6);
            background: rgba(0, 119, 181, 0.2);
            color: #8ed0f2;
        }

        .btn-linkedin:hover {
            background: rgba(0, 119, 181, 0.4);
            border-color: #59a6d4;
            color: #bce5ff;
        }

        .creator-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
