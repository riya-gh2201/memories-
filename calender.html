<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ink: #1e1208;
      --ink-soft: #4a2f1a;
      --rust: #b84c2a;
      --sand: #e8d5b5;
      --paper: #f7efe0;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: 'DM Mono', monospace;
      background: transparent;
    }

    .cal {
      width: 100%;
      padding: 6px 10px 14px;
      background: transparent;
    }

    /* header row */
    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 2px 10px;
      border-bottom: 1px solid rgba(74, 47, 26, 0.15);
      margin-bottom: 6px;
    }

    .cal-head h2 {
      font-family: 'Reenie Beanie', cursive;
      font-size: 1.3rem;
      color: var(--ink);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-btn {
      background: none;
      border: 1px solid rgba(74, 47, 26, 0.2);
      border-radius: 2px;
      color: var(--ink-soft);
      width: 26px;
      height: 26px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .nav-btn:hover {
      border-color: var(--rust);
      background: rgba(184, 76, 42, 0.06);
    }

    /* weekday row */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .wday {
      font-size: 0.58rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--rust);
      padding: 4px 0 6px;
      font-weight: 400;
    }

    /* day cells */
    .day {
      padding: 6px 2px;
      font-size: 0.75rem;
      color: var(--ink);
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
      position: relative;
      line-height: 1;
      min-height: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .day:hover {
      background: rgba(184, 76, 42, 0.09);
    }

    .day.other {
      color: rgba(74, 47, 26, 0.3);
      cursor: default;
    }

    .day.other:hover {
      background: none;
    }

    .day.today {
      background: var(--ink);
      color: var(--sand);
      font-weight: 400;
    }

    .day.today::after {
      content: '•';
      position: absolute;
      bottom: 3px;
      font-size: 0.45rem;
      color: var(--rust);
    }

    .day.selected {
      background: var(--rust);
      color: #fff;
    }

    .day.has-entry::before {
      content: '';
      width: 4px;
      height: 4px;
      background: var(--rust);
      border-radius: 50%;
      position: absolute;
      bottom: 3px;
    }

    .day.today.has-entry::before {
      background: var(--sand);
    }
  </style>
</head>

<body>
  <div class="cal">
    <div class="cal-head">
      <button id="prev" class="nav-btn">&#8249;</button>
      <h2 id="monthLabel"></h2>
      <button id="next" class="nav-btn">&#8250;</button>
    </div>
    <div class="cal-grid">
      <div class="wday">Su</div>
      <div class="wday">Mo</div>
      <div class="wday">Tu</div>
      <div class="wday">We</div>
      <div class="wday">Th</div>
      <div class="wday">Fr</div>
      <div class="wday">Sa</div>
    </div>
    <div class="cal-grid" id="days"></div>
  </div>

  <script>
    let cur = new Date(); 
    let sel = null;
    const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    // read saved entries from localStorage to mark dots
    function getEntryDates() {
      try {
        const entries = JSON.parse(localStorage.getItem('memoryEntries') || '[]');
        return new Set(entries.map(e => e.date));
      } catch (e) { return new Set(); }
    }

    function render() {
      const y = cur.getFullYear(), m = cur.getMonth();
      document.getElementById('monthLabel').textContent = MONTHS[m] + ' ' + y;
      const grid = document.getElementById('days');
      grid.innerHTML = '';
      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const prevDays = new Date(y, m, 0).getDate();
      const today = new Date();
      const entryDates = getEntryDates();

      // prev month tail
      for (let i = firstDay - 1; i >= 0; i--) {
        const d = document.createElement('div');
        d.className = 'day other';
        d.textContent = prevDays - i;
        grid.appendChild(d);
      }
      // current month
      for (let day = 1; day <= daysInMonth; day++) {
        const d = document.createElement('div');
        d.className = 'day';
        d.textContent = day;
        const iso = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        if (y === today.getFullYear() && m === today.getMonth() && day === today.getDate()) d.classList.add('today');
        if (sel && sel === iso) d.classList.add('selected');
        if (entryDates.has(iso)) d.classList.add('has-entry');
        d.addEventListener('click', () => {
          sel = iso;
          render();
          const target = window.parent !== window ? window.parent : window;
          target.location.href = 'template-editor.html?date=' + iso;
        });
        grid.appendChild(d);
      }
      // next month padding
      const total = firstDay + daysInMonth;
      const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let day = 1; day <= remaining; day++) {
        const d = document.createElement('div');
        d.className = 'day other';
        d.textContent = day;
        grid.appendChild(d);
      }
    }

    document.getElementById('prev').addEventListener('click', () => { cur.setMonth(cur.getMonth() - 1); render(); });
    document.getElementById('next').addEventListener('click', () => { cur.setMonth(cur.getMonth() + 1); render(); });
    render();
  </script>
</body>

</html>
